<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Roots - Sign Up</title>
    <link rel="stylesheet" href="./main.css">
</head>
<body class="forms">
    <fieldset class="field">
        <legend>Sign Up</legend>
        <div class="all">

        <div>
        <form class="payform">
            <label>First Name:</label>
            <input class="label" type="text"  name="name" placeholder="Enter your first name">
            <br><br>
              <label>Last Name:</label>
        <input class="label" type="text"  name="name" placeholder="Enter your last name">
        <br><br>
      
        <label for="email">Email:</label>
        <input class="label" type="email" name="email" placeholder="Example@gmail.com">
        <br><br>
        <label>Password:</label>
        <input class="label" type="password"  name="password" placeholder="Enter your password">
        <br><br>
         <label>Phone Number:</label>
        <input class="label" type="text" name="phone" placeholder="Enter your phone number">
        <br><br>
          <label> Gender:</label>
        <br>
        <input class="label" type="radio"  name="gender" value="male">
        <label for="male">Male</label>
        <br>
        <input class="label" type="radio"  name="gender" value="female">
        <label for="female">Female</label>
        <br><br>
        <label>Languages:</label><br>
        <input class="label" type="checkbox" name="languages" placeholder="Enter your languages">
        <label for="languages">English</label>
        <br>
        <input class="label" type="checkbox"  name="languages" placeholder="Enter your languages">
        <label for="languages2">Spanish</label>
        <br>
        <input class="label" type="checkbox"  name="languages" placeholder="Enter your languages">
        <label for="languages3">French</label>
        <br>
        <input class="label" type="checkbox"  name="languages" placeholder="Enter your languages">
        <label for="languages4">Arabic</label>
        <br><br>
        <textarea class="label" placeholder="Enter your favorite dishes..." cols="40" rows="5"></textarea>
        <br><br>

 

        <input class="btn" type="submit" value="Submit">
        <input class="btn" type="reset" value="Reset">
        <br>
    </form>
    </div>
<div class="both">
            <img src="./images/r3.jpg">
            <img src="./images/r4.jpg">
     
        </div>
</div>

    </fieldset>
</body>
</html>
